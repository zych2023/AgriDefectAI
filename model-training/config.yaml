# ============================================================
# 智慧农业AI病虫害识别 — 项目配置文件
# ============================================================

# -------- 数据集配置 --------
data:
  root_dir: "../Data"
  train_images: "../Data/AgriculturalDisease_trainingset/images"
  train_annotations: "../Data/AgriculturalDisease_trainingset/train_list.txt"
  val_images: "../Data/AgriculturalDisease_validationset/images"
  val_annotations: "../Data/AgriculturalDisease_validationset/AgriculturalDisease_validation_annotations.json"
  image_size: 224          # ResNet 标准输入
  num_classes: 36

# -------- 训练超参 --------
train:
  batch_size: 64           # V100 32G 可用 64
  epochs: 50
  learning_rate: 0.0003    # AdamW 初始学习率
  weight_decay: 0.0001
  warmup_epochs: 2         # 前2个epoch线性warmup
  patience: 15              # Early Stop: 验证集loss不降即停
  label_smoothing: 0.05     # 61类细粒度任务，标签平滑防过拟合
  num_workers: 4           # DataLoader进程数
  mixed_precision: true    # 混合精度训练(AMP) 加速

# -------- 数据增强 --------
augmentation:
  random_crop_scale: [0.8, 1.0]
  random_crop_ratio: [0.9, 1.1]
  horizontal_flip_prob: 0.5
  rotation_degrees: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
  normalize_mean: [0.485, 0.456, 0.406]   # ImageNet统计值
  normalize_std:  [0.229, 0.224, 0.225]

# -------- 模型配置 --------
model:
  name: "resnet50"
  pretrained: true         # ImageNet预训练权重
  dropout: 0.2             # 全连接层dropout

# -------- 保存路径 --------
checkpoint:
  save_dir: "./checkpoints"
  best_model: "./checkpoints/best_model.pth"
  final_model: "./checkpoints/final_model.pth"
  onnx_model: "./checkpoints/model.onnx"

